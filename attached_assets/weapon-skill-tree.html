<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Grudge Warlords — Weapon Skill Trees</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--panel:#12121a;--card:#1a1a2e;--border:#2a2a3e;--text:#e0e0e0;--dim:#888;--accent:#c9a44a;--red:#ef4444;--blue:#3b82f6;--green:#22c55e;--purple:#8b5cf6;--orange:#d97706;--gray:#6b7280}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
/* Sidebar */
#sidebar{width:200px;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
#sidebar h2{padding:14px;font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:2px;border-bottom:1px solid var(--border);text-align:center}
.cat-label{padding:6px 14px;font-size:9px;color:#555;text-transform:uppercase;letter-spacing:2px;margin-top:6px;border-top:1px solid #1a1a2e}
.weapon-btn{display:flex;align-items:center;gap:8px;padding:8px 14px;border:none;background:transparent;color:var(--text);cursor:pointer;font-size:12px;width:100%;transition:.15s;border-left:3px solid transparent}
.weapon-btn:hover{background:rgba(201,164,74,.1);border-left-color:var(--accent)}
.weapon-btn.active{background:rgba(201,164,74,.15);border-left-color:var(--accent);color:var(--accent)}
.weapon-btn img{width:28px;height:28px;object-fit:contain}
.weapon-btn .fb{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--card);border-radius:4px}
/* Main */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
/* Variant bar */
#variant-bar{display:flex;gap:4px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.variant-btn{padding:8px 14px;border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:8px;cursor:pointer;font-size:11px;white-space:nowrap;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:110px}
.variant-btn:hover{border-color:var(--accent);background:rgba(201,164,74,.08)}
.variant-btn.active{border-color:var(--accent);background:rgba(201,164,74,.15);color:var(--accent)}
.variant-btn .vname{font-weight:600;font-size:12px}
.variant-btn .vtype{font-size:9px;color:var(--dim)}
/* Tabs */
#tab-bar{display:flex;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
.tab-btn{flex:1;padding:10px;border:none;background:transparent;color:var(--dim);cursor:pointer;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid transparent;transition:.15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
/* Content */
#content{flex:1;overflow-y:auto;padding:20px 24px}
/* Header */
.wh{display:flex;align-items:center;gap:16px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.wh img{width:48px;height:48px;object-fit:contain;filter:drop-shadow(0 0 6px rgba(201,164,74,.3))}
.wh h1{font-size:22px}.wh .sub{font-size:11px;color:var(--dim);margin-top:2px}
.badges{display:flex;gap:4px;margin-top:4px}
.badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.badge-warrior{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.25)}
.badge-mage{background:rgba(139,92,246,.15);color:#8b5cf6;border:1px solid rgba(139,92,246,.25)}
.badge-ranger{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.25)}
.badge-worge{background:rgba(217,119,6,.15);color:#d97706;border:1px solid rgba(217,119,6,.25)}
/* Section */
.sec{font-size:15px;color:var(--accent);margin:20px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.sec::before{content:'';width:3px;height:16px;background:var(--accent);border-radius:2px}
/* Mastery tree */
.m-tier{padding:12px 0;text-align:center}
.m-tier-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.m-skills{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.m-node{width:130px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;cursor:pointer;transition:.15s;position:relative}
.m-node:hover{border-color:var(--accent);box-shadow:0 0 12px rgba(201,164,74,.15);transform:translateY(-1px)}
.m-node img{width:36px;height:36px;object-fit:contain;margin-bottom:4px}
.m-node .n{font-size:11px;font-weight:600;color:#fff}
.m-node .e{font-size:9px;color:var(--accent);margin-top:2px}
.m-node .sb{font-size:10px;padding:2px 5px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);border-radius:3px;color:#22c55e;margin-top:4px;display:inline-block}
.m-node .pb{position:absolute;top:3px;right:3px;font-size:7px;background:rgba(201,164,74,.2);color:var(--accent);padding:1px 4px;border-radius:3px;text-transform:uppercase}
/* Variant info */
.v-info{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
.v-lore{font-size:12px;color:var(--dim);font-style:italic;margin-bottom:10px}
.v-abilities{display:flex;flex-wrap:wrap;gap:6px}
.v-ab{font-size:10px;padding:4px 10px;border-radius:6px;background:rgba(201,164,74,.1);border:1px solid rgba(201,164,74,.15);color:var(--accent)}
.v-sig{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444}
.v-pas{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.15);color:#22c55e}
.v-sec-title{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin:8px 0 4px}
.v-basic{font-size:11px;color:var(--text);margin-bottom:6px}
.v-basic span{color:var(--accent);font-weight:600}
/* Tooltip */
.tt{display:none;position:fixed;z-index:1000;background:#1a1a2e;border:1px solid var(--accent);border-radius:8px;padding:14px;width:260px;box-shadow:0 6px 24px rgba(0,0,0,.5);pointer-events:none}
.tt.show{display:block}
.tt .th{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.tt .th img{width:36px;height:36px;object-fit:contain}
.tt .tn{font-size:14px;font-weight:700;color:#fff}
.tt .tl{font-size:9px;color:var(--accent);text-transform:uppercase}
.tt .td{font-size:11px;color:var(--dim);margin-bottom:6px;line-height:1.3}
.tt .ts{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:6px}
.tt .ts div{font-size:10px;padding:2px 5px;background:rgba(255,255,255,.04);border-radius:3px}
.tt .ts span{color:var(--accent)}
.icon-fb{display:flex;align-items:center;justify-content:center;font-size:14px;background:rgba(201,164,74,.1);border-radius:4px;color:var(--accent)}
.coming{text-align:center;padding:40px 20px;color:var(--dim)}.coming h3{font-size:16px;margin:12px 0 6px;color:var(--text)}.coming p{font-size:12px}
.conn{display:flex;justify-content:center;padding:4px 0}
.conn-line{width:2px;height:16px;background:var(--border);border-radius:1px}
</style>
</head>

  mace:{c:'#a855f7',t:[{n:'Tier 1',s:[{name:'Crushing Force',icon:WI('weapons_full/Hammer_11.png'),d:'Mace damage increase',e:'+6% Damage',b:'+6%'},{name:'Daze',icon:WI('icons/misc/Lighting.png'),d:'Daze chance on hit',e:'+5% Daze',b:'+5%'}]},{n:'Tier 2',s:[{name:'Skull Crack',icon:WI('icons/misc/Power.png'),d:'Stun chance increase',e:'+6% Stun',b:'+6%'},{name:'Armor Crush',icon:WI('weapons_full/Shield_01.png'),d:'Armor penetration',e:'+8% Pen',b:'+8%'}]},{n:'Tier 3',s:[{name:'Holy Strike',icon:WI('icons/misc/Lights.png'),d:'Holy damage bonus',e:'+10% Holy',b:'+10%'},{name:'Bone Breaker',icon:WI('icons/misc/frozen.png'),d:'Slow chance on hit',e:'+5% Slow',b:'+5%'}]},{n:'Tier 4',s:[{name:'Crusader',icon:WI('icons/misc/Glow.png'),d:'All mace stats',e:'+8% All',b:'+8%'}]}]}
};

// shared mastery for types that reference another's tree
const MT_ALIAS={greatsword:'sword',greataxe:'axe',greathammer:'hammer',crossbow:'bow',gun:'bow',tome:'staff',wand:'staff',focus:'staff',shield:'hammer'};

// ── STATE ──
let curType='sword',curVar=0,curTab='mastery';
const $wl=document.getElementById('wlist'),$vb=document.getElementById('variant-bar'),$ct=document.getElementById('content'),$tt=document.getElementById('tt');

function buildSidebar(){
  let lc='';
  TYPES.forEach(t=>{
    if(t.cat!==lc){lc=t.cat;const d=document.createElement('div');d.className='cat-label';d.textContent=lc;$wl.appendChild(d)}
    const b=document.createElement('button');b.className='weapon-btn';b.dataset.id=t.id;
    b.innerHTML=`<img src="${WICONS[t.id]}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="fb" style="display:none">${EMO[t.id]||'⚔️'}</span><span>${t.name}</span>`;
    b.onclick=()=>{curType=t.id;curVar=0;update()};$wl.appendChild(b);
  });
}

function switchTab(t){curTab=t;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));renderContent()}

function update(){
  document.querySelectorAll('.weapon-btn').forEach(b=>b.classList.toggle('active',b.dataset.id===curType));
  const vars=VARIANTS[curType]||[];
  $vb.innerHTML='';
  vars.forEach((v,i)=>{
    const b=document.createElement('button');b.className='variant-btn'+(i===curVar?' active':'');
    // use element-specific icon for magic weapons
    let iconUrl=WICONS[curType];
    if(v.elem&&ELEM_ICONS[v.elem])iconUrl=ELEM_ICONS[v.elem];
    b.innerHTML=`<img src="${iconUrl}" width="24" height="24" style="object-fit:contain" onerror="this.style.display='none'"><span class="vname">${v.name}</span><span class="vtype">${v.sub}</span>`;
    b.onclick=()=>{curVar=i;update()};$vb.appendChild(b);
  });
  renderContent();
}

function renderContent(){
  const vars=VARIANTS[curType]||[];const v=vars[curVar];const tp=TYPES.find(x=>x.id===curType);const cls=getCls(curType);
  if(curTab==='mastery') renderMastery(tp,cls);
  else renderSkills(tp,cls,v);
}

function getIcon(v){
  if(v&&v.elem&&ELEM_ICONS[v.elem])return ELEM_ICONS[v.elem];
  return WICONS[curType];
}

function renderMastery(tp,cls){
  const mKey=MT[curType]?curType:(MT_ALIAS[curType]||null);
  const m=mKey?MT[mKey]:null;
  const aliased=mKey&&mKey!==curType;
  let h=`<div class="wh"><img src="${WICONS[curType]}" onerror="this.outerHTML='<div style=font-size:36px>${EMO[curType]||'⚔'}</div>'"><div><h1>${tp.name} Mastery</h1><div class="sub">Passive skill tree${aliased?' (shared with '+mKey+')':''} — affects all ${tp.name} variants</div><div class="badges">${cls.map(c=>`<span class="badge badge-${c.toLowerCase()}">${c}</span>`).join('')}</div></div></div>`;
  if(m){
    m.t.forEach((tier,ti)=>{
      if(ti>0)h+=`<div class="conn"><div class="conn-line"></div></div>`;
      h+=`<div class="m-tier"><div class="m-tier-label">${tier.n}</div><div class="m-skills">`;
      tier.s.forEach(s=>{
        const sd=JSON.stringify(s).replace(/'/g,"&#39;").replace(/"/g,'&quot;');
        h+=`<div class="m-node" data-sk="${sd}"><span class="pb">Passive</span><img src="${s.icon}" width="36" height="36" style="object-fit:contain" onerror="this.style.display='none'"><div class="n">${s.name}</div><div class="e">${s.e}</div><div class="sb">${s.b}</div></div>`;
      });
      h+=`</div></div>`;
    });
  } else {
    h+=`<div class="coming"><div style="font-size:40px;opacity:.5">${EMO[curType]||'⚔️'}</div><h3>Mastery Tree In Development</h3><p>The ${tp.name} passive mastery tree is coming soon.</p></div>`;
  }
  $ct.innerHTML=h;bindTT();
}

function renderSkills(tp,cls,v){
  let iconUrl=getIcon(v);
  let h=`<div class="wh"><img src="${iconUrl}" onerror="this.outerHTML='<div style=font-size:36px>${EMO[curType]||'⚔'}</div>'"><div><h1>${v?v.name:tp.name}</h1><div class="sub">${v?v.sub:tp.name} — Combat Skills</div><div class="badges">${cls.map(c=>`<span class="badge badge-${c.toLowerCase()}">${c}</span>`).join('')}</div></div></div>`;
  if(v){
    h+=`<div class="v-info">`;
    h+=`<div class="v-lore">"${v.lore}"</div>`;
    h+=`<div class="v-basic">Basic Attack: <span>${v.basic}</span></div>`;
    h+=`<div class="v-sec-title">Abilities (${v.abilities.length})</div><div class="v-abilities">${v.abilities.map(a=>`<span class="v-ab">${a}</span>`).join('')}</div>`;
    h+=`<div class="v-sec-title">Signature Ability</div><div class="v-abilities"><span class="v-ab v-sig">★ ${v.sig}</span></div>`;
    h+=`<div class="v-sec-title">Passives</div><div class="v-abilities">${v.passives.map(p=>`<span class="v-ab v-pas">✦ ${p}</span>`).join('')}</div>`;
    h+=`</div>`;
  } else {
    h+=`<div class="coming"><h3>No variant data available</h3></div>`;
  }
  $ct.innerHTML=h;
}

function bindTT(){
  document.querySelectorAll('[data-sk]').forEach(el=>{
    el.addEventListener('mouseenter',e=>{
      const s=JSON.parse(el.dataset.sk.replace(/&quot;/g,'"').replace(/&#39;/g,"'"));
      let i=`<div class="th"><img src="${s.icon||''}" width="36" height="36" style="object-fit:contain" onerror="this.style.display='none'"><div><div class="tn">${s.name}</div><div class="tl">Passive Mastery</div></div></div>`;
      i+=`<div class="td">${s.d||''}</div>`;
      if(s.e)i+=`<div style="font-size:11px;color:var(--accent);margin-bottom:4px">Effect: ${s.e}</div>`;
      if(s.b)i+=`<div style="font-size:10px;padding:2px 5px;background:rgba(255,255,255,.04);border-radius:3px;display:inline-block">📊 ${s.b}</div>`;
      $tt.innerHTML=i;$tt.classList.add('show');posTT(e);
    });
    el.addEventListener('mousemove',posTT);
    el.addEventListener('mouseleave',()=>$tt.classList.remove('show'));
  });
}

function posTT(e){
  let x=e.clientX+12,y=e.clientY+12;
  if(x+270>innerWidth)x=e.clientX-270-12;
  const r=$tt.getBoundingClientRect();
  if(y+r.height>innerHeight)y=innerHeight-r.height-12;
  $tt.style.left=x+'px';$tt.style.top=y+'px';
}

buildSidebar();update();
</script>
</body>
</html>
