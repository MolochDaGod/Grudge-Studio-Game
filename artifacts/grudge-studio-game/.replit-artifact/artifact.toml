kind = "web"
previewPath = "/"
title = "Grudge Studio: Fantasy RPG"
version = "1.0.0"
id = "artifacts/grudge-studio-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25905
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/grudge-studio-game run dev"

[services.env]
PORT = "25905"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/grudge-studio-game", "run", "build"]
publicDir = "artifacts/grudge-studio-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
